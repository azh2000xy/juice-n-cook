  - 料酒
  steps:
  - 草鱼（一般 3 斤 ）从背部切开，两面沿着鱼的背部往下划几刀，不要划到鱼肚皮，不然不易定型
  - 把鱼放到容器中，加入料酒，10g 白胡椒粉，5g 食盐抹匀腌制二十分钟入味。
  - 把半根大葱切成一块一块，大蒜粒中间切开，和八角香叶桂皮放在一个容器中
  file: recipes/cooking/aquatic/混合烤鱼/烤鱼.md
  source: howtocook
- title: 清蒸生蚝

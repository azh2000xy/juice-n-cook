- title: 烙饼
  category: staple
  cooking_method: 凉拌
  difficulty: 4
  ingredients:
  - 油
  - 面粉
  - 电饼铛
  tags:
  - 油
  - 面粉
  - 电饼铛
  steps:
  - 将 400g 面粉倒入盆中，一半用凉水和面，一半用热水和面，搅拌成面絮，用手揉成团。用保鲜膜封起来，醒面 40 分钟
  - 离醒面完成时间还有 10 分钟时，请查看[小技巧](../../condiment/油酥.md)中的油酥做法（热油酥效果更好）
  - 醒好的面不用揉，稍微摁一下，用一横刀一竖刀将其分成四份。

- title: 咖喱炒蟹
  category: aquatic
  cooking_method: 炒
  difficulty: 4
  ingredients:
  - 青蟹
  - 咖喱块
  - 洋葱
  - 椰浆
  - 鸡蛋
  - 生粉
  - 大蒜
  tags:
  - 水产
  - 青蟹
  - 咖喱块
  - 洋葱
  steps:
  - 肉蟹掀盖后对半砍开，蟹钳用刀背轻轻拍裂，切口和蟹钳蘸一下生粉，不要太多。撒 5g 生粉到蟹盖中，盖住蟹黄，备用
  - 洋葱切成洋葱碎，备用
  - 大蒜切碎，备用
  file: recipes/cooking/aquatic/咖喱炒蟹.md
  source: howtocook
- title: 响油鳝丝
  category: aquatic
  cooking_method: 凉拌
  difficulty: 3
  ingredients:
  - 鳝丝
  - 大蒜
  - 姜末
  - 料酒
  - 生抽
  - 蚝油
  - 老抽
  - 食用盐
  - 白糖
  - 胡椒粉
  - 淀粉
  - 蒜末
  - 葱花
  - 猪油
  tags:
  - 水产
  - 鳝丝
  - 大蒜
  - 姜末
  steps:
  - 将鳝鱼切成三段后切成细丝
  - 加入 0.5 g 胡椒粉、3 g 料酒搅拌均匀，再加入 5 g 香油腌制
  - 热油滑锅
  file: recipes/cooking/aquatic/响油鳝丝.md
  source: howtocook
- title: 小龙虾
  category: aquatic
  cooking_method: 炒
  difficulty: 4
  ingredients:
  - 小龙虾
  - 油
  - 香叶
  - 八角
  - 桂皮
  - 青花椒
  - 花椒
  - 子弹头辣椒
  - 葱姜蒜
  - 郫县豆瓣
  - 黄豆酱
  - 啤酒
  - 生抽
  - 盐
  tags:
  - 小龙虾
  - 油
  - 香叶
  steps:
  - 小龙虾刷干净去虾线，葱切 2cm 葱段，姜蒜切末。
  - 烧油，油微热, 下香叶、八角、桂皮、青花椒、花椒、子弹头辣椒。
  - 香料出香气之后下锅葱姜蒜
  file: recipes/cooking/aquatic/小龙虾/小龙虾.md
  source: howtocook
- title: 干煎阿根廷红虾
  category: aquatic
  cooking_method: 煎
  difficulty: 3
  ingredients:
  - 阿根廷红虾
  - 海盐
  - 黑胡椒
  - 白葡萄酒
  - 生抽
  - 香菜
  - 柠檬
  - 洋葱
  - 生姜
  - 大蒜
  tags:
  - 阿根廷红虾
  - 海盐
  - 黑胡椒
  steps:
  - 阿根廷红虾解冻，最好是提前 1 天从速冻取出放到冷藏里自然解冻，能更好保持风味和口感。可买已经开背去虾线的，节省了不少时间
  - 解冻好的红虾洗净擦干备用，注意这里一定要沥干水分，赶时间可以用厨房用纸吸干水分
  - 生姜切片，洋葱切小方块，香菜洗干净后，叶茎分离，把香菜叶切碎，大蒜压碎切成小块碎末
  file: recipes/cooking/aquatic/干煎阿根廷红虾/干煎阿根廷红虾.md
  source: howtocook
- title: 微波葱姜黑鳕鱼
  category: aquatic
  cooking_method: 蒸
  difficulty: 3
  ingredients:
  - 黑鳕鱼，带皮
  - 青葱
  - 姜
  - 料酒
  - 酱油
  - 芝麻油
  - 花生油
  - 密封袋
  tags:
  - 水产
  - 黑鳕鱼，带皮
  - 青葱
  - 姜
  steps:
  - 鱼片分别放入密封袋，鱼皮向下放在盘子中。
  - 取葱白切丝 25g，姜去皮后切丝，10g，混合在一起后分成两半，分别放在袋内鱼片上。
  - 每个袋子倒入 2.5mL 料酒。
  file: recipes/cooking/aquatic/微波葱姜黑鳕鱼.md
  source: howtocook
- title: 水煮鱼
  category: aquatic
  cooking_method: 煮
  difficulty: 4
  ingredients:
  - 巴沙鱼
  - 蔬菜
  - 红油豆瓣酱

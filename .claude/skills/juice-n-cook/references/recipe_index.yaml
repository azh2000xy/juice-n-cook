- title: 油焖大虾
  category: aquatic
  cooking_method: 焖
  difficulty: 4
  ingredients:
  - 黑虎虾 or 明虾
  - 葱、姜
  - 料酒、盐、冰糖、植物油
  tags:
  - 黑虎虾 or 明虾
  - 葱、姜
  - 料酒、盐、冰糖、植物油
  steps:
  - 剪虾枪到根上，虾须虾爪都剪掉，沙包挑掉，开背虾线挑出来，洗净备用
  - 下油，虾摆放整齐，两面变色后轻轻摁虾头
  - 大火烧开转小火盖盖子闷（中途不能再加汤水，不要开盖）
  file: recipes/cooking/aquatic/油焖大虾/油焖大虾.md
  source: howtocook

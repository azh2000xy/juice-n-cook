- title: 油酥
  category: condiment
  cooking_method: 凉拌
  difficulty: 2
  ingredients:
  - 面粉
  - 油
  - 盐
  tags:
  - 调料
  - 面粉
  - 油
  - 盐
  steps:
  - 面粉盛小碗里，加入盐
  - 加入 200 度的热油
  - 用筷子将其搅拌成无固状物体的糊状。
  file: recipes/cooking/condiment/油酥.md
  source: howtocook
- title: 炸串酱料
  category: condiment
  cooking_method: 炸
  difficulty: 2
  ingredients:
  - 干辣椒面
  - 孜然粉
  - 胡椒粉
  - 五香粉
  - 花椒粉
  - 十三香
  - 麻辣鲜
  - 白芝麻
  tags:
  - 调料
  - 干辣椒面
  - 孜然粉
  - 胡椒粉
  steps:
  - 所有原料在容器内混合，搅拌均匀。
  - 锅里烧热油，油的用量以在容器内没过所有原材料为佳。
  - 分三次淋入热油，每次 1/3，同时搅拌。
  file: recipes/cooking/condiment/炸串酱料.md
  source: howtocook
- title: 简易版炒糖色
  category: condiment
  cooking_method: 炒
  difficulty: 4
  ingredients:
  - 糖
  tags:
  - 调料
  - 糖
  steps:
  - 开火，并向锅中倒入 100ml 开水

- title: 基础牛奶面包
  category: staple
  cooking_method: 通用
  difficulty: 5
  ingredients:
  - 高筋或中筋面粉 *
  - 鸡蛋 *
  - 糖 *
  - 干酵母
  - 盐
  - 牛奶或淡奶油或炼乳或奶粉 *
  - 黄油或玉米油 *
  - 谷朊粉
  - 香草精
  - 量杯
  - 布
  - 擀面杖
  - 硅油纸或模具
  tags:
  - 高筋或中筋面粉 *
  - 鸡蛋 *
  - 糖 *
  steps:
  - 首先，将酵母和 ***30℃ 的温水*** 用刮刀或厨具混合均匀，静置 5 分钟。之后与面粉混合，搅拌均匀。此时的酵头应该是**特别粘稠**的面糊。
  - 用布盖上面糊，将面糊放置到**温暖的地方**进行发酵，时长为 45 ~ 60 分钟。
  - 最终的面糊应该是表面有很多气泡的且体积明显增大。
  file: recipes/cooking/staple/基础牛奶面包/基础牛奶面包.md
  source: howtocook

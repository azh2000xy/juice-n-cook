- title: 太阳蛋
  category: breakfast
  cooking_method: 凉拌
  difficulty: 2
  ingredients:
  - 鸡蛋
  - 盐
  - 油
  - 筷子或牙签
  tags:
  - 早餐
  - 鸡蛋
  - 盐
  - 油
  steps:
  - 准备一个小碗，倒入在上一步计算好的油，撒盐，搅拌均匀。倾斜碗使油沾在碗表面。
  - 取出一个鸡蛋，打入小碗。
  - 蛋黄表面戳孔。牙签戳 5 个或筷子戳 1 个。
  file: recipes/cooking/breakfast/太阳蛋.md
  source: howtocook
- title: 完美水煮蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 2
  ingredients:
  - 新鲜鸡蛋
  - 定时器
  tags:
  - 早餐
  - 新鲜鸡蛋
  - 定时器
  steps:
  - 准备两锅水： A 锅维持 100°C 沸水， B 锅维持 30°C 温水
  - 用漏勺将鸡蛋放入 A 锅，启动定时器
  - 精准**每 2 分钟**将鸡蛋转移至另一锅水
  file: recipes/cooking/breakfast/完美水煮蛋.md
  source: howtocook
- title: 微波炉荷包蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 1
  ingredients:
  - 鸡蛋
  - 芝麻油
  - 盐
  tags:
  - 早餐
  - 鸡蛋
  - 芝麻油
  - 盐
  steps:
  - 将鸡蛋打入小碗中，用筷子在所有鸡蛋黄上扎 2 个洞，避免加热弄脏微波炉
  - 然后向碗内倒入常温饮用水
  - 再向碗内倒入食用盐
  file: recipes/cooking/breakfast/微波炉荷包蛋.md
  source: howtocook
- title: 微波炉蒸蛋
  category: breakfast
  cooking_method: 蒸
  difficulty: 1
  ingredients:
  - 鸡蛋
  - 温水或高汤
  - 食盐
  - 生抽
  - 香油
  tags:
  - 早餐
  - 鸡蛋
  - 温水或高汤
  - 食盐
  steps:
  - 将鸡蛋打散，加入温水/高汤、盐、生抽，轻轻搅匀，尽量不要起泡。
  - 将蛋液过筛倒入耐热碗中，表面若有气泡可用牙签轻戳。
  - 覆盖保鲜膜并扎 8-10 个小孔，或使用微波炉专用盖（留缝隙）。
  file: recipes/cooking/breakfast/微波炉蒸蛋.md
  source: howtocook
- title: 微波炉蛋糕
  category: breakfast
  cooking_method: 煮
  difficulty: 1
  ingredients:
  - 黄油
  - 面粉
  - 泡打粉
  - 鸡蛋
  tags:
  - 早餐
  - 黄油
  - 面粉
  - 泡打粉
  steps:
  - 加入以下食材，注意不要超过容器的 3/4
  - 夸赞一下自己🥰
  - 微波炉（高火）加热 **1分钟** （至蓬松蛋糕形态）
  file: recipes/cooking/breakfast/微波炉蛋糕.md
  source: howtocook
- title: 意式香肠北非蛋
  category: breakfast
  cooking_method: 焖
  difficulty: 3
  ingredients:
  - 意式猪肉香肠
  - 百味来
  - 鸡蛋
  - 甜椒
  - 洋葱
  - 橄榄油
  - 帕马森干酪
  - 新鲜欧芹
  - 干辣椒碎
  - 面包
  tags:
  - 早餐
  - 意式猪肉香肠
  - 百味来
  - 鸡蛋
  steps:
  - 将意式猪肉香肠去肠衣备用；洋葱切小丁；甜椒切细丝。
  - 在宽口平底锅中倒入 10ml - 15ml 橄榄油，中火加热。
  - 放入处理好的香肠或午餐肉，翻炒至边缘金黄酥脆（如果使用生香肠，翻炒时用勺子将其捣碎变色）。
  file: recipes/cooking/breakfast/意式香肠北非蛋.md
  source: howtocook
- title: 手抓饼
  category: breakfast
  cooking_method: 凉拌
  difficulty: 2
  ingredients:
  - 普通面粉
  - 开水
  - 冷水
  - 食用油
  - 盐
  - 鸡蛋
  - 生菜
  - 火腿
  - 芝士片
  tags:
  - 早餐
  - 普通面粉
  - 开水
  - 冷水
  steps:
  - 面粉放入碗中，加入开水搅拌成絮状，再加入冷水揉成光滑面团，覆盖湿布静置 20 分钟。
  - 面团分成每份约 100 克，搓圆，擀成薄片。
  - 表面均匀涂抹食用油，撒上盐，卷成蜗牛状，松弛 10 分钟。
  file: recipes/cooking/breakfast/手抓饼.md
  source: howtocook
- title: 桂圆红枣粥
  category: breakfast
  cooking_method: 煮
  difficulty: 2
  ingredients:
  - 糯米
  - 红枣
  - 桂圆
  tags:
  - 早餐
  - 糯米
  - 红枣
  - 桂圆
  steps:
  - 将桂圆肉扒出，用清水洗两次，放入碗中浸泡 10 分钟
  - 红枣用清水洗两次，放入碗中浸泡 10 分钟
  - 糯米放入电饭锅中，清水淘米两次后，加入 2000ml 水
  file: recipes/cooking/breakfast/桂圆红枣粥.md
  source: howtocook
- title: 水煮玉米
  category: breakfast
  cooking_method: 煮
  difficulty: 2
  ingredients:
  - 新鲜玉米
  - 水
  - 盐
  - 糖
  tags:
  - 早餐
  - 新鲜玉米
  - 水
  - 盐
  steps:
  - 将新鲜玉米剥去外皮，剩部分玉米皮入锅
  - 加入淹过玉米约半节指头的水，加盐和糖
  - 水煮开之后转至小火，加盖继续煮 15-20 分钟，玉米煮久点没事。
  file: recipes/cooking/breakfast/水煮玉米.md
  source: howtocook
- title: 温泉蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 3
  ingredients:
  - 鸡蛋
  - 厨房用温度计
  - 杯子
  - 昆布酱油
  - 香葱
  tags:
  - 鸡蛋
  - 厨房用温度计
  - 杯子
  steps:
  - 在锅中盛装一定量自来水，确保水面没过约鸡蛋 3cm，水中插入温度计
  - 开火或打开电磁炉，逐渐调整电磁炉功率或火苗大小，使得水温保持在 **70 摄氏度**
  - 将鸡蛋放入锅中。鸡蛋不可互相堆叠，应皆在底部，并留有空间可以晃动
  file: recipes/cooking/breakfast/温泉蛋/温泉蛋.md
  source: howtocook
- title: 溏心蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 3
  ingredients:
  - 鸡蛋
  - 水
  - 秒表
  tags:
  - 早餐
  - 鸡蛋
  - 水
  - 秒表
  steps:
  - 将鸡蛋放入电锅中。鸡蛋不可互相堆叠，应皆在底部，并留有空间可以晃动
  - 倒入淹过鸡蛋约 2 公分的冷水
  - 开盖，使用最大功率加热至水滚起（大约 85 - 95 度，稍微滚动，不需完全沸腾）
  file: recipes/cooking/breakfast/溏心蛋.md
  source: howtocook
- title: 煎饺
  category: breakfast
  cooking_method: 煎
  difficulty: 2
  ingredients:
  - 饺子
  - 芝麻、葱花
  tags:
  - 早餐
  - 饺子
  - 芝麻、葱花
  steps:
  - 取出平底锅（不沾平底锅最佳）
  - 加入 10ml - 15 ml 食用油
  - 开火，放入饺子（尽量平均铺开，不宜堆叠）
  file: recipes/cooking/breakfast/煎饺.md
  source: howtocook
- title: 燕麦鸡蛋饼
  category: breakfast
  cooking_method: 凉拌
  difficulty: 2
  ingredients:
  - 鸡蛋
  - 燕麦
  - 牛奶
  - 可根据口味选择增加
  tags:
  - 早餐
  - 鸡蛋
  - 燕麦
  - 牛奶
  steps:
  - 将牛奶与干燕麦混合搅拌均匀至黏稠状。
  - 将鸡蛋搅拌均匀至颜色单一程度。
  - 将鸡蛋液倒入燕麦牛奶中继续搅拌至黏稠、均匀。
  file: recipes/cooking/breakfast/燕麦鸡蛋饼.md
  source: howtocook
- title: 牛奶燕麦
  category: breakfast
  cooking_method: 煮
  difficulty: 1
  ingredients:
  - 牛奶
  - 燕麦
  - 鸡蛋
  tags:
  - 早餐
  - 牛奶
  - 燕麦
  - 鸡蛋
  steps:
  - 将牛奶倒入早餐杯（冷的即可）
  - 准备好 200ml 水，如果是直饮水直接加入燕麦，否则请烧开后加入燕麦
  - 水沸后 2 分钟，燕麦煮好
  file: recipes/cooking/breakfast/牛奶燕麦.md
  source: howtocook
- title: 空气炸锅面包片
  category: breakfast
  cooking_method: 炸
  difficulty: 1
  ingredients:
  - 面包片
  tags:
  - 早餐
  - 面包片
  steps:
  - 取出两片面包片（建议使用粗粮面包片）
  - 将面包片**垂直**放入空气炸锅
  - 200°C 烘烤 5 分钟
  file: recipes/cooking/breakfast/空气炸锅面包片.md
  source: howtocook
- title: 美式炒蛋
  category: breakfast
  cooking_method: 炒
  difficulty: 2
  ingredients:
  - 鸡蛋
  - 全脂牛奶/奶油
  - 黄油
  - 盐
  tags:
  - 早餐
  - 鸡蛋
  - 全脂牛奶/奶油
  - 黄油
  steps:
  - 鸡蛋打入大碗中，加盐搅打至起泡，静置 15 分钟
  - 黄油切小块入锅，倒入蛋液，开小火不断搅拌
  - 黄油一融化，就快速翻动蛋液，将其打碎成细密状，在蛋液大体凝固前关火
  file: recipes/cooking/breakfast/美式炒蛋.md
  source: howtocook
- title: 苏格兰蛋
  category: breakfast
  cooking_method: 炸
  difficulty: 3
  ingredients:
  - 鸡蛋
  - 手抓饼皮
  - 芝士
  - 培根
  tags:
  - 鸡蛋
  - 手抓饼皮
  - 芝士
  steps:
  - 用冷水下锅水开 3 分钟后捞出
  - 鸡蛋捞出，放入冰水中剥壳更快速也更完整
  - 用芝士片包裹鸡蛋
  file: recipes/cooking/breakfast/苏格兰蛋/苏格兰蛋.md
  source: howtocook
- title: 茶叶蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 3
  ingredients:
  - 鸡蛋
  - 八角
  - 香叶
  - 桂皮
  - 茴香
  - 冰糖
  - 红茶
  - 生抽
  - 老抽
  - 食盐
  tags:
  - 早餐
  - 鸡蛋
  - 八角
  - 香叶
  steps:
  - 用冷水将鸡蛋煮熟，大火大约 8 分钟（根据自家厨具决定）
  - 鸡蛋捞出，过冷水
  - 将鸡蛋互相碰撞，使每个鸡蛋产生裂缝
  file: recipes/cooking/breakfast/茶叶蛋.md
  source: howtocook
- title: 蒸水蛋
  category: breakfast
  cooking_method: 蒸
  difficulty: 2
  ingredients:
  - 新鲜鸡蛋
  - 热水
  tags:
  - 早餐
  - 新鲜鸡蛋
  - 热水
  steps:
  - 鸡蛋打入碗中，打散
  - 取其他容器，倒入 1.5 倍（半个蛋壳为 0.5 倍水）于蛋液的温水（温度 20~30），将盐倒入水中化开
  - 将盐水倒入鸡蛋液中，顺时针或逆时针单方向搅拌均匀，气泡之类的可以用舀出丢弃，过筛则口感更加。
  file: recipes/cooking/breakfast/蒸水蛋.md
  source: howtocook
- title: 蒸花卷
  category: breakfast
  cooking_method: 蒸
  difficulty: 2
  ingredients:
  - 冷冻花卷
  - 圆碟子
  - 蒸架
  - 水
  tags:
  - 早餐
  - 冷冻花卷
  - 圆碟子
  - 蒸架
  steps:
  - 从花卷的包装袋中取出 5 个花卷
  - 把花卷平铺在碟子上，尽量不用重叠
  - 往锅里倒入 400ml 水，把蒸架放里面，把装花卷的碟子放在蒸架上，盖上锅盖。
  file: recipes/cooking/breakfast/蒸花卷.md
  source: howtocook
- title: 蛋煎糍粑
  category: breakfast
  cooking_method: 煎
  difficulty: 2
  ingredients:
  - 鸡蛋
  - 糍粑
  - 白糖或红糖
  tags:
  - 早餐
  - 鸡蛋
  - 糍粑
  - 白糖或红糖
  steps:
  - 把糍粑切成长方形小块，便于后面煎
  - 碗里打入一个鸡蛋并把鸡蛋搅碎，加入 2g 食用盐
  - 将切好的小糍粑依此放入搅碎的鸡蛋里面，涂抹完糍粑双面为止
  file: recipes/cooking/breakfast/蛋煎糍粑.md
  source: howtocook
- title: 金枪鱼酱三明治
  category: breakfast
  cooking_method: 烤
  difficulty: 1
  ingredients:
  - 水浸金枪鱼罐头
  - 方形吐司片
  - 蛋黄酱
  - 俄式酸黄瓜汁
  - 芝士片
  - 火腿片
  - 轻食机
  tags:
  - 早餐
  - 水浸金枪鱼罐头
  - 方形吐司片
  - 蛋黄酱
  steps:
  - 将金枪鱼、蛋黄酱、俄式酸黄瓜汁倒入碗中，用勺子搅拌，保证将金枪鱼块搅碎，酱整体呈糊状，并备用
  - 将 1 片吐司放在轻食机上
  - 将做好的金枪鱼酱涂抹到吐司上，建议 10-15ml
  file: recipes/cooking/breakfast/金枪鱼酱三明治.md
  source: howtocook
- title: 韩国麻药鸡蛋
  category: breakfast
  cooking_method: 煮
  difficulty: 1
  ingredients:
  - 鸡蛋
  - 韩式酱油
  - 日式味淋
  - 白糖
  - 芝麻油
  - 青葱
  - 辣椒
  tags:
  - 早餐
  - 鸡蛋
  - 韩式酱油
  - 日式味淋
  steps:
  - 烧一锅开水，水沸腾后放入鸡蛋，**煮 7 分钟**（得到完美的溏心蛋状态）。
  - 煮鸡蛋的期间调制酱汁：将 4 汤匙酱油、4 汤匙清水、2 汤匙味淋、2 汤匙白糖倒入小锅中。
  - 加热酱汁至沸腾，煮开以挥发掉味淋中的酒精味，随后关火放凉备用。
  file: recipes/cooking/breakfast/韩国麻药鸡蛋.md
  source: howtocook
- title: 鸡蛋三明治
  category: breakfast
  cooking_method: 煮
  difficulty: 2
  ingredients:
  - 鸡蛋
  - 吐司
  - 培根
  - 黄油
  - 蛋黄酱
  - 盐
  - 黑胡椒
  tags:
  - 早餐
  - 鸡蛋
  - 吐司
  - 培根
  steps:
  - 吐司切去四边，备用
  - 鸡蛋煮熟，捣碎
  - 混合鸡蛋、蛋黄酱、盐、黑胡椒
  file: recipes/cooking/breakfast/鸡蛋三明治.md
  source: howtocook
- title: 油泼辣子

- title: 芝麻烧饼
  category: staple
  cooking_method: 烧
  difficulty: 3
  ingredients:
  - 面粉
  - 酵母粉
  - 白糖
  - 十三香
  - 食用油
  - 温水
  tags:
  - 面粉
  - 酵母粉
  - 白糖
  steps:
  - 面团：300 克面粉，3 克酵母粉，3 克白糖，180 克温水，20 克食用油，醒面 10 分钟
  - 油酥：小碗放 30 克面粉，2 克盐，4 克十三香，20 克食用油，拌匀后，静置
  - 做饼：面擀成长方形，抹上调好的油酥，从一头卷起，切成 7 个面剂子，对折，用虎口收拢即可，先沾水再沾白芝麻，擀成小圆饼
